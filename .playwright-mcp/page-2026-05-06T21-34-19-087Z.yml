          - heading "DKIM ＝ 実印" [level=3] [ref=e61]
          - paragraph [ref=e62]: 会社の実印を押すように、メールに電子サインを付けます。サインがあれば「本物の会社から送られた本物のメール」だと証明できます。
        - article [ref=e63]:
          - img [ref=e65]
          - heading "DMARC ＝ 警察" [level=3] [ref=e68]
          - paragraph [ref=e69]: 住所や実印をチェックして、怪しいメールを見つけたら「捨てる」「隔離する」「そのまま通す」の指示を出すルールです。
