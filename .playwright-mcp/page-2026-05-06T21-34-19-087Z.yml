          - heading "SPF ＝ 住所登録" [level=3] [ref=e55]
          - paragraph [ref=e56]: 「うちの会社からメールを送るのは、このサーバーだけです」と登録するイメージ。登録されていない住所から届いたメールは怪しいと分かります。
        - article [ref=e57]:
