          - paragraph [ref=e32]: メールの電子サイン
          - paragraph [ref=e33]: メールに電子サインをつけて、「このメールは本物です」と証明します。途中で改ざんされていないことも確認できます。
          - paragraph [ref=e34]: ＝本物の証明書
        - article [ref=e35]:
          - img [ref=e37]
          - heading "DMARC" [level=3] [ref=e40]
          - paragraph [ref=e41]: 怪しいメールのルール設定
          - paragraph [ref=e42]: SPFやDKIMの結果をもとに、怪しいメールを「どう扱うか」を決めるルールです。偽装メールの最終防衛ラインです。
          - paragraph [ref=e43]: ＝ルールと監視
